```html
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  height:100%;
  background:transparent;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
}

.player{
  width:350px;
  height:500px;

  border-radius:36px;

  background:rgba(255,255,255,.18);

  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);

  border:1px solid rgba(255,255,255,.35);

  box-shadow:
  0 12px 40px rgba(0,0,0,.12),
  inset 0 1px 0 rgba(255,255,255,.6);

  overflow:hidden;
}

.cover{
  height:330px;

  position:relative;

  background:
  linear-gradient(rgba(0,0,0,.08),rgba(0,0,0,.4)),
  url("https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?q=80&w=1200&auto=format&fit=crop")
  center/cover;

}

.cover::after{
  content:"";

  position:absolute;
  inset:0;

  background:
  linear-gradient(
  135deg,
  rgba(255,255,255,.35),
  transparent 35%,
  transparent 70%,
  rgba(255,255,255,.15)
  );

}

.info{
  padding:18px 20px 0;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.title{
  font-size:28px;
  font-weight:700;
  letter-spacing:-1px;
}

.artist{
  margin-top:4px;
  color:#666;
  font-size:14px;
}

.heart{
  color:#EB3B17;
  font-size:24px;
}

.progress-wrap{
  padding:14px 20px 0;
}

.time{
  display:flex;
  justify-content:space-between;
  font-size:11px;
  color:#666;
  margin-bottom:8px;
}

.progress{
  height:4px;
  border-radius:999px;
  background:rgba(0,0,0,.08);
}

.bar{
  width:42%;
  height:100%;
  border-radius:999px;
  background:#fff;
}

.controls{
  margin-top:18px;

  display:flex;
  justify-content:center;
  align-items:center;

  gap:44px;
}

.icon{
  font-size:26px;
  color:#222;
}

.play{
  width:52px;
  height:52px;

  border-radius:50%;

  background:#111;

  color:white;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:18px;
}
</style>
</head>

<body>

<div class="player">

<div class="cover"></div>

<div class="info">

<div class="row">
<div>
<div class="title">愛如火</div>
<div class="artist">苏星婕</div>
</div>

<div class="heart">♥</div>
</div>

</div>

<div class="progress-wrap">

<div class="time">
<span>1:24</span>
<span>3:48</span>
</div>

<div class="progress">
<div class="bar"></div>
</div>

</div>

<div class="controls">

<div class="icon">⏮</div>

<div class="play">Ⅱ</div>

<div class="icon">⏭</div>

</div>

</div>

</body>
</html>
```
