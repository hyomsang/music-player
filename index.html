<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Music Widget</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100vh;
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .player {
      position: relative;
      width: 280px;
      height: 400px;
      border-radius: 32px;
      overflow: hidden;
      background: rgba(255, 255, 255, .24);
      backdrop-filter: blur(22px) saturate(160%);
      -webkit-backdrop-filter: blur(22px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, .55);
      box-shadow: none;
      isolation: isolate;
    }

    .player::before {
      content: "";
      position: absolute;
      inset: -36px;
      background:
        linear-gradient(rgba(20,25,30,.06), rgba(20,25,30,.32)),
        radial-gradient(circle at 28% 25%, rgba(255,255,255,.9), transparent 18%),
        radial-gradient(circle at 70% 40%, #b8c3ca, transparent 30%),
        linear-gradient(135deg, #8192a0, #d2b497 45%, #354251 88%);
      filter: blur(42px) saturate(130%);
      opacity: .58;
      z-index: -1;
    }

    .inner {
      width: 100%;
      height: 100%;
      padding: 12px;
      display: flex;
      flex-direction: column;
    }

    .cover {
      position: relative;
      width: 100%;
      height: 220px;
      border-radius: 24px;
      overflow: hidden;
      flex-shrink: 0;
      background:
        linear-gradient(rgba(20,25,30,.06), rgba(20,25,30,.46)),
        radial-gradient(circle at 28% 25%, rgba(255,255,255,.9), transparent 16%),
        radial-gradient(circle at 70% 40%, #b8c3ca, transparent 27%),
        linear-gradient(135deg, #8192a0, #d2b497 45%, #354251 88%);
      box-shadow: none;
    }

    .cover::before {
      content: "愛如火";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: white;
      font-size: 46px;
      font-family: Georgia, serif;
      font-style: italic;
      transform: rotate(-7deg);
      text-shadow: 0 4px 14px rgba(0,0,0,.35);
    }

    .cover::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(255,255,255,.35), transparent 30%, transparent 70%, rgba(255,255,255,.15));
    }

    .info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      padding: 0 2px;
      flex-shrink: 0;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -1px;
      color: #111;
      line-height: 1;
    }

    .artist {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    .heart {
      font-size: 26px;
      color: #EB3B17;
      line-height: 1;
    }

    .progress-wrap {
      margin-top: 12px;
      flex-shrink: 0;
    }

    .time {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #777;
      margin-bottom: 6px;
    }

    .progress {
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,.45);
      overflow: hidden;
    }

    .bar {
      width: 42%;
      height: 100%;
      background: white;
      border-radius: 999px;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 36px;
      margin-top: 17px;
      color: #222;
      flex-shrink: 0;
    }

    .icon {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    .play {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="player">
    <div class="inner">
      <div class="cover"></div>

      <div class="info">
        <div>
          <div class="title">愛如火</div>
          <div class="artist">苏星婕</div>
        </div>
        <div class="heart">♥</div>
      </div>

      <div class="progress-wrap">
        <div class="time">
          <span>1:24</span>
          <span>3:48</span>
        </div>
        <div class="progress">
          <div class="bar"></div>
        </div>
      </div>

      <div class="controls">
        <svg class="icon" viewBox="0 0 44 44" aria-hidden="true">
          <path d="M18.5 12.8c1.1-.8 2.6 0 2.6 1.4v15.6c0 1.4-1.5 2.2-2.6 1.4L8.3 23.4c-.9-.7-.9-2.1 0-2.8l10.2-7.8Z"/>
          <path d="M34.2 12.8c1.1-.8 2.6 0 2.6 1.4v15.6c0 1.4-1.5 2.2-2.6 1.4L24 23.4c-.9-.7-.9-2.1 0-2.8l10.2-7.8Z"/>
        </svg>

        <div class="play">Ⅱ</div>

        <svg class="icon" viewBox="0 0 44 44" aria-hidden="true">
          <path d="M25.5 12.8c-1.1-.8-2.6 0-2.6 1.4v15.6c0 1.4 1.5 2.2 2.6 1.4l10.2-7.8c.9-.7.9-2.1 0-2.8l-10.2-7.8Z"/>
          <path d="M9.8 12.8c-1.1-.8-2.6 0-2.6 1.4v15.6c0 1.4 1.5 2.2 2.6 1.4L20 23.4c.9-.7.9-2.1 0-2.8L9.8 12.8Z"/>
        </svg>
      </div>
    </div>
  </div>
</body>
</html>
