
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  min-height:100vh;
  background:transparent;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
}

.player{
  position:relative;
  width:280px;
  height:400px;
  border-radius:32px;
  overflow:hidden;
  background:rgba(255,255,255,.24);
  backdrop-filter:blur(22px) saturate(160%);
  -webkit-backdrop-filter:blur(22px) saturate(160%);
  border:1px solid rgba(255,255,255,.55);
  box-shadow:none;
  isolation:isolate;
}

.bg-video{
  position:absolute;
  inset:-36px;
  width:calc(100% + 72px);
  height:calc(100% + 72px);
  object-fit:cover;
  filter:blur(42px) saturate(130%) brightness(.85);
  opacity:.58;
  z-index:-1;
}

.inner{
  width:100%;
  height:100%;
  padding:12px;
  display:flex;
  flex-direction:column;
}

.cover{
  position:relative;
  width:100%;
  height:220px;
  border-radius:24px;
  overflow:hidden;
  flex-shrink:0;
  box-shadow:none;
}

.cover-video{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.cover::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(rgba(20,25,30,.04),rgba(20,25,30,.18)),
    linear-gradient(120deg,rgba(255,255,255,.32),transparent 30%,transparent 70%,rgba(255,255,255,.12));
  pointer-events:none;
}

.info{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:14px;
  padding:0 2px;
  flex-shrink:0;
}

.title{
  max-width:210px;
  font-size:22px;
  font-weight:700;
  letter-spacing:-1px;
  color:#111;
  line-height:1.1;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.artist{
  max-width:210px;
  font-size:12px;
  color:#666;
  margin-top:4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.heart{
  font-size:26px;
  color:#EB3B17;
  line-height:1;
}

.progress-wrap{
  margin-top:12px;
  flex-shrink:0;
}

.time{
  display:flex;
  justify-content:space-between;
  font-size:10px;
  color:#777;
  margin-bottom:6px;
}

.progress{
  height:4px;
  border-radius:999px;
  background:rgba(255,255,255,.45);
  overflow:hidden;
}

.bar{
  width:0%;
  height:100%;
  background:white;
  border-radius:999px;
  transition:width .3s linear;
}

.controls{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:36px;
  margin-top:17px;
  color:#222;
  flex-shrink:0;
}

button{
  border:0;
  background:transparent;
  cursor:pointer;
  font-family:inherit;
}

.icon{
  width:22px;
  height:22px;
  fill:currentColor;
}

.play{
  width:38px;
  height:38px;
  border-radius:50%;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:14px;
  font-weight:700;
  line-height:1;
}

#youtube-player{
  position:absolute;
  left:-9999px;
  top:-9999px;
  width:200px;
  height:200px;
  opacity:0;
  pointer-events:none;
}
</style>
</head>

<body>

<div id="youtube-player"></div>

<div class="player">
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="./cover.mp4.mp4" type="video/mp4">
  </video>

  <div class="inner">
    <div class="cover">
      <video class="cover-video" autoplay muted loop playsinline>
        <source src="./cover.mp4.mp4" type="video/mp4">
      </video>
    </div>

    <div class="info">
      <div>
        <div class="title" id="songTitle">Loading...</div>
        <div class="artist" id="songArtist">열심히 살자</div>
      </div>
      <div class="heart">♥</div>
    </div>

    <div class="progress-wrap">
      <div class="time">
        <span id="currentTime">0:00</span>
        <span id="duration">0:00</span>
      </div>
      <div class="progress">
        <div class="bar" id="progressBar"></div>
      </div>
    </div>

    <div class="controls">
      <button onclick="prevTrack()" aria-label="이전 곡">
        <svg class="icon" viewBox="0 0 44 44">
          <path d="M18.5 12.8c1.1-.8 2.6 0 2.6 1.4v15.6c0 1.4-1.5 2.2-2.6 1.4L8.3 23.4c-.9-.7-.9-2.1 0-2.8l10.2-7.8Z"/>
          <path d="M34.2 12.8c1.1-.8 2.6 0 2.6 1.4v15.6c0 1.4-1.5 2.2-2.6 1.4L24 23.4c-.9-.7-.9-2.1 0-2.8l10.2-7.8Z"/>
        </svg>
      </button>

      <button class="play" id="playButton" onclick="togglePlay()">▶</button>

      <button onclick="nextTrack()" aria-label="다음 곡">
        <svg class="icon" viewBox="0 0 44 44">
          <path d="M25.5 12.8c-1.1-.8-2.6 0-2.6 1.4v15.6c0 1.4 1.5 2.2 2.6 1.4l10.2-7.8c.9-.7.9-2.1 0-2.8l-10.2-7.8Z"/>
          <path d="M9.8 12.8c-1.1-.8-2.6 0-2.6 1.4v15.6c0 1.4 1.5 2.2 2.6 1.4L20 23.4c.9-.7.9-2.1 0-2.8L9.8 12.8Z"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;
let isReady = false;
let progressTimer = null;

const playlistId = "PLuhjoDuDDGqmGwHX4fGRzdl5VoIni0-YC";

function onYouTubeIframeAPIReady(){
  player = new YT.Player("youtube-player", {
    width: 200,
    height: 200,
    playerVars: {
      listType: "playlist",
      list: playlistId,
      controls: 0,
      disablekb: 1,
      modestbranding: 1,
      rel: 0,
      playsinline: 1
    },
    events: {
      onReady: function(){
        isReady = true;
        setTimeout(updateTrackInfo, 800);
      },
      onStateChange: function(event){
        updateTrackInfo();

        const btn = document.getElementById("playButton");

        if(event.data === YT.PlayerState.PLAYING){
          btn.textContent = "Ⅱ";
          startProgress();
        }else{
          btn.textContent = "▶";
          stopProgress();
        }
      }
    }
  });
}

function parseTitle(rawTitle){
  let title = rawTitle || "Unknown Track";

  const separators = [" - ", " – ", " — ", " | "];

  for(const sep of separators){
    if(title.includes(sep)){
      const parts = title.split(sep);
      title = parts.slice(1).join(sep).trim();
      break;
    }
  }

  title = title
    .replace(/\(Official.*?\)/gi, "")
    .replace(/\[Official.*?\]/gi, "")
    .replace(/\(Lyrics.*?\)/gi, "")
    .replace(/\[Lyrics.*?\]/gi, "")
    .replace(/\(Audio.*?\)/gi, "")
    .replace(/\[Audio.*?\]/gi, "")
    .trim();

  return title || "Unknown Track";
}

function updateTrackInfo(){
  if(!player || !isReady) return;

  const data = player.getVideoData();
  const title = parseTitle(data.title || "Loading...");

  document.getElementById("songTitle").textContent = title;
  document.getElementById("songArtist").textContent = "열심히 살자";
}

function togglePlay(){
  if(!isReady) return;

  const state = player.getPlayerState();

  if(state === YT.PlayerState.PLAYING){
    player.pauseVideo();
  }else{
    player.playVideo();
  }
}

function nextTrack(){
  if(!isReady) return;
  player.nextVideo();
  setTimeout(updateTrackInfo, 900);
}

function prevTrack(){
  if(!isReady) return;
  player.previousVideo();
  setTimeout(updateTrackInfo, 900);
}

function startProgress(){
  stopProgress();

  progressTimer = setInterval(() => {
    if(!player || !isReady) return;

    const current = player.getCurrentTime() || 0;
    const duration = player.getDuration() || 0;

    document.getElementById("currentTime").textContent = formatTime(current);
    document.getElementById("duration").textContent = formatTime(duration);

    if(duration > 0){
      const percent = Math.min((current / duration) * 100, 100);
      document.getElementById("progressBar").style.width = percent + "%";
    }
  }, 500);
}

function stopProgress(){
  if(progressTimer){
    clearInterval(progressTimer);
    progressTimer = null;
  }
}

function formatTime(seconds){
  seconds = Math.floor(seconds || 0);
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m}:${String(s).padStart(2,"0")}`;
}
</script>

</body>
</html>
