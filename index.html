<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apple Music Style Widget</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,.85) 0, transparent 28%),
        linear-gradient(135deg, #d8dee8, #9faaba 52%, #eef1f4);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      color: #111;
      overflow: hidden;
    }

    .player {
      position: relative;
      width: 430px;
      border-radius: 42px;
      overflow: hidden;
      background: rgba(245, 247, 250, .5);
      backdrop-filter: blur(38px) saturate(180%);
      -webkit-backdrop-filter: blur(38px) saturate(180%);
      border: 1px solid rgba(255,255,255,.74);
      box-shadow:
        0 34px 90px rgba(35, 45, 62, .32),
        inset 0 1px 0 rgba(255,255,255,.95),
        inset 0 -1px 0 rgba(0,0,0,.06);
      isolation: isolate;
    }

    .player::before {
      content: "";
      position: absolute;
      inset: -55px;
      background:
        linear-gradient(rgba(20,25,30,.14), rgba(20,25,30,.48)),
        radial-gradient(circle at 28% 25%, rgba(255,255,255,.9), transparent 18%),
        radial-gradient(circle at 70% 40%, #b8c3ca, transparent 30%),
        linear-gradient(135deg, #8192a0, #d2b497 45%, #354251 88%);
      filter: blur(62px) saturate(135%) brightness(.88);
      transform: scale(1.22);
      opacity: .7;
      z-index: -2;
    }

    .player::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(145deg, rgba(255,255,255,.46), transparent 28%, transparent 72%, rgba(255,255,255,.17)),
        radial-gradient(circle at 22% 8%, rgba(255,255,255,.5), transparent 24%);
      pointer-events: none;
      z-index: 5;
      mix-blend-mode: screen;
    }

    .topbar {
      position: relative;
      z-index: 10;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      border-bottom: 1px solid rgba(255,255,255,.32);
    }

    .traffic {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.08);
    }

    .red { background: #ff5f57; }
    .yellow { background: #ffbd2e; }
    .green { background: #28c840; }

    .status {
      font-size: 11px;
      font-weight: 700;
      color: rgba(0,0,0,.42);
      letter-spacing: .09em;
    }

    .menu {
      width: 28px;
      height: 28px;
      border: 0;
      border-radius: 50%;
      background: rgba(255,255,255,.38);
      color: rgba(0,0,0,.5);
      font-size: 17px;
      cursor: pointer;
    }

    .content {
      position: relative;
      z-index: 10;
      padding: 18px 18px 22px;
    }

    .cover {
      position: relative;
      width: 100%;
      height: 360px;
      border-radius: 34px;
      overflow: hidden;
      background:
        linear-gradient(rgba(20,25,30,.04), rgba(20,25,30,.48)),
        radial-gradient(circle at 28% 25%, rgba(255,255,255,.9), transparent 16%),
        radial-gradient(circle at 70% 40%, #b8c3ca, transparent 27%),
        linear-gradient(135deg, #8192a0, #d2b497 45%, #354251 88%);
      box-shadow:
        0 26px 48px rgba(34,43,55,.34),
        inset 0 1px 0 rgba(255,255,255,.58),
        inset 0 -1px 0 rgba(0,0,0,.12);
    }

    .cover::before {
      content: "愛如火";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: white;
      font-family: Georgia, serif;
      font-size: 58px;
      font-style: italic;
      text-shadow: 0 5px 18px rgba(0,0,0,.36);
      transform: rotate(-7deg);
    }

    .cover::after {
      content: "苏星婕";
      position: absolute;
      left: 50%;
      bottom: 66px;
      transform: translateX(-50%);
      color: rgba(255,255,255,.86);
      font-size: 13px;
      letter-spacing: .4em;
      writing-mode: vertical-rl;
      text-shadow: 0 2px 12px rgba(0,0,0,.35);
    }

    .shine {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(120deg, rgba(255,255,255,.48), transparent 30%, transparent 68%, rgba(255,255,255,.18));
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .info {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: end;
      margin-top: 18px;
      padding: 0 4px;
    }

    h1 {
      margin: 0;
      font-size: 29px;
      line-height: 1;
      letter-spacing: -.045em;
    }

    .artist {
      margin: 5px 0 0;
      font-size: 15px;
      color: rgba(0,0,0,.52);
      font-weight: 500;
    }

    .heart {
      width: 38px;
      height: 38px;
      border: 0;
      background: transparent;
      color: #EB3B17;
      font-size: 30px;
      line-height: 1;
      cursor: pointer;
      text-shadow: 0 8px 18px rgba(235,59,23,.24);
    }

    .progress-area {
      margin-top: 15px;
      padding: 0 4px;
    }

    .time {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      font-weight: 650;
      color: rgba(0,0,0,.5);
    }

    .progress {
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,.44);
      overflow: hidden;
      box-shadow:
        inset 0 1px 2px rgba(0,0,0,.1),
        0 1px 0 rgba(255,255,255,.55);
    }

    .bar {
      width: 43%;
      height: 100%;
      border-radius: inherit;
      background: rgba(255,255,255,.92);
      box-shadow: 0 0 10px rgba(255,255,255,.55);
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 56px;
      padding: 24px 0 0;
      color: rgba(0,0,0,.72);
    }

    button {
      font-family: inherit;
    }

    .control {
      border: 0;
      background: transparent;
      color: currentColor;
      cursor: pointer;
      padding: 0;
      display: grid;
      place-items: center;
    }

    .skip {
      width: 34px;
      height: 34px;
    }

    .pause {
      width: 42px;
      height: 42px;
    }

    .skip svg {
      width: 29px;
      height: 29px;
    }

    .pause svg {
      width: 34px;
      height: 34px;
    }

    .control svg {
      fill: currentColor;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,.14));
    }

    @media (max-width: 480px) {
      .player { width: calc(100vw - 28px); }
      .cover { height: 340px; }
      .controls { gap: 48px; }
    }
  </style>
</head>
<body>
  <main class="player">
    <div class="topbar">
      <div class="traffic">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
      </div>
      <div class="status">NOW PLAYING</div>
      <button class="menu">•••</button>
    </div>

    <section class="content">
      <div class="cover">
        <div class="shine"></div>
      </div>

      <div class="info">
        <div>
          <h1>愛如火</h1>
          <p class="artist">苏星婕</p>
        </div>
        <button class="heart" aria-label="좋아요">♥</button>
      </div>

      <div class="progress-area">
        <div class="time">
          <span>1:24</span>
          <div class="progress"><div class="bar"></div></div>
          <span>3:48</span>
        </div>
      </div>

      <div class="controls" aria-label="재생 컨트롤">
        <button class="control skip" aria-label="이전 곡">
          <svg viewBox="0 0 44 44" aria-hidden="true">
            <path d="M18.5 12.8c1.1-.8 2.6 0 2.6 1.4v15.6c0 1.4-1.5 2.2-2.6 1.4L8.3 23.4c-.9-.7-.9-2.1 0-2.8l10.2-7.8Z"/>
            <path d="M34.2 12.8c1.1-.8 2.6 0 2.6 1.4v15.6c0 1.4-1.5 2.2-2.6 1.4L24 23.4c-.9-.7-.9-2.1 0-2.8l10.2-7.8Z"/>
          </svg>
        </button>

        <button class="control pause" aria-label="일시정지">
          <svg viewBox="0 0 44 44" aria-hidden="true">
            <rect x="13" y="9" width="7.5" height="26" rx="2.4"/>
            <rect x="23.5" y="9" width="7.5" height="26" rx="2.4"/>
          </svg>
        </button>

        <button class="control skip" aria-label="다음 곡">
          <svg viewBox="0 0 44 44" aria-hidden="true">
            <path d="M25.5 12.8c-1.1-.8-2.6 0-2.6 1.4v15.6c0 1.4 1.5 2.2 2.6 1.4l10.2-7.8c.9-.7.9-2.1 0-2.8l-10.2-7.8Z"/>
            <path d="M9.8 12.8c-1.1-.8-2.6 0-2.6 1.4v15.6c0 1.4 1.5 2.2 2.6 1.4L20 23.4c.9-.7.9-2.1 0-2.8L9.8 12.8Z"/>
          </svg>
        </button>
      </div>
    </section>
  </main>
</body>
</html>
